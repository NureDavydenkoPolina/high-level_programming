<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>

<style>
    body {
        background-color: #ffebf8; 
        color: #000000;
    }

    a {
        color: #7c9aed; 
        text-decoration: none;
    }

    a:hover {
        text-decoration: underline;
    }

    ul {
        padding: 0;
    }

    li {
        list-style: none;
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 10px;
    }

    input {
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #a5b4fc;
    }

    button {
        padding: 10px;
        background-color: #a5b4fc;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        color: white;
    }

    button:hover {
        background-color: #818cf8;
    }
</style>

</head>
<body>

{% block content %}
{% endblock %}

</body>
</html>
